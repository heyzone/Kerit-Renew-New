name: Kerit-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '0 1 * * *'

env:
  PRIVATE_REPO: ${{ github.repository_owner }}/KeritAuto
  PRIVATE_REPO_REF: main
  PYTHON_VERSION: '3.10'
  GOST_LOCAL_PORT: 8080

jobs:
  run_kerit_login:
    runs-on: ubuntu-latest
    steps:
      - name: 🔐 下载私库代码
        uses: actions/checkout@v4
        with:
          repository: ${{ env.PRIVATE_REPO }}
          ref: ${{ env.PRIVATE_REPO_REF }}
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: private

      - name: 🐍 设置 Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 🛡️ 启动 GOST 代理转发
        if: ${{ env.GOST_PROXY != '' }}
        env:
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
        run: |
          VERSION=$(curl -s https://api.github.com/repos/ginuerzh/gost/releases/latest | grep '"tag_name"' | cut -d'"' -f4 | tr -d 'v')
          echo "📦 GOST 版本: $VERSION"
          wget -q "https://github.com/ginuerzh/gost/releases/download/v${VERSION}/gost_${VERSION}_linux_amd64.tar.gz"
          tar -xzf "gost_${VERSION}_linux_amd64.tar.gz"
          chmod +x gost
          nohup ./gost -L http://:${{ env.GOST_LOCAL_PORT }} -F "$GOST_PROXY" > gost.log 2>&1 &
          sleep 3
          echo "✅ GOST 已启动，测试连通性..."
          curl -s -x http://127.0.0.1:${{ env.GOST_LOCAL_PORT }} https://api.ipify.org | sed 's/\.[0-9]*$/.**/' && echo

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase
          seleniumbase install uc_driver

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          KERIT_ACCOUNT: ${{ secrets.KERIT_ACCOUNT }}
          GOST_PROXY: ${{ secrets.GOST_PROXY }}
          TG_BOT: ${{ secrets.TG_BOT }}
        run: |
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python private/Kerit_Renew.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
